name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  terraform-checks:
    name: Terraform checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.5.0

      - name: Terraform fmt check
        run: terraform fmt -check -recursive

      - name: Terraform init
        run: terraform -chdir=. init -input=false

      - name: Terraform validate
        run: terraform -chdir=. validate

      - name: Terraform plan
        run: terraform -chdir=. plan -out=plan.tfplan

  snyk-checks:
    name: Snyk IaC and dependency checks
    runs-on: ubuntu-latest
    needs: terraform-checks
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Snyk CLI
        run: |
          python -m pip install --upgrade pip
          pip install snyk

      - name: Authenticate Snyk
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: snyk auth $SNYK_TOKEN

      - name: Snyk IaC test (Terraform)
        run: snyk iac test --severity-threshold=high --json > snyk-iac-report.json

      - name: Snyk test for project dependencies (skip if none)
        run: |
          if [ -f "requirements.txt" ]; then
            snyk test --file=requirements.txt --severity-threshold=high --json > snyk-deps-report.json || true
          else
            echo "No requirements.txt found, skipping dependency scan"
          fi

      - name: Upload Snyk reports
        uses: actions/upload-artifact@v4
        with:
          name: snyk-reports
          path: |
            snyk-iac-report.json
            snyk-deps-report.json

